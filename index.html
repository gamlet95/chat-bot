<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat con Emily</title>
</head>
<body style="font-family: system-ui; margin: 0; padding: 0;">
  <div style="max-width: 760px; margin: 24px auto; padding: 0 12px;">
    <h2>Chat con Emily</h2>

    <div id="chat" style="border:1px solid #ddd; border-radius:8px; padding:12px; min-height:320px;"></div>

    <div style="display:flex; gap:8px; margin-top:12px;">
      <input id="msg" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:8px;"
             placeholder="Escribe aquí..." />
      <button id="send" style="padding:10px 14px;">Enviar</button>
      <button id="reset" style="padding:10px 14px;">Nueva sesión</button>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwufjSVNg8ajUkmhvu-kCwUthNx-ILC0GTEEFUxVvY7CJ3c4PCF1lBQ3QoSYabBCCNu/exec";
  const storageKey = "vapiSessionId";
  let sessionId = localStorage.getItem(storageKey) || "";

  function add(role, text) {
    const row = document.createElement("div");
    row.style.padding = "6px 0";
    row.innerHTML = `<b>${role}:</b> ${String(text).replaceAll("\n","<br/>")}`;
    document.getElementById("chat").appendChild(row);
  }

  async function send() {
    const input = document.getElementById("msg");
    const message = input.value.trim();
    if (!message) return;
    input.value = "";
    add("Tú", message);

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message, sessionId: sessionId || undefined })
    });

    const data = await res.json();
    if (!data.ok) {
      add("Sistema", "Error: " + (data.error || "unknown"));
      return;
    }

    sessionId = data.sessionId;
    localStorage.setItem(storageKey, sessionId);
    add("Emily", data.reply || "(sin respuesta)");
  }

  function resetSession() {
    sessionId = "";
    localStorage.removeItem(storageKey);
    add("Sistema", "Sesión reiniciada.");
  }

  document.getElementById("send").onclick = send;
  document.getElementById("reset").onclick = resetSession;
  document.getElementById("msg").addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });
</script>
</body>
</html>
